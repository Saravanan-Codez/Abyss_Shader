# =============================================================================
# Abyss Shader — shaders.properties
# Buffer formats, profile presets, and per-profile option overrides.
# Only defines that actually exist in shaders.settings appear here.
# =============================================================================

fog=off

# ---------------------------------------------------------------------------
# Profile declarations
# ---------------------------------------------------------------------------
profile.Potato=POTATO
profile.Medium=MEDIUM
profile.High=HIGH
profile.Ultra=ULTRA

# ---------------------------------------------------------------------------
# G-Buffer formats
#   colortex0–2   RGBA8   albedo / normals / lightmap
#   colortex3     RGBA16  HDR lit scene
#   colortex4     RGBA8   emissive (r) + AO (g)
#   colortex5     RGBA16  TAA history (cleared = false so it persists)
#   colortex6     RGBA16  bloom extraction chain
# ---------------------------------------------------------------------------
colortex0Format=RGBA8
colortex1Format=RGBA8
colortex2Format=RGBA8
colortex3Format=RGBA16
colortex4Format=RGBA8
colortex5Format=RGBA16
colortex6Format=RGBA16

colortex5Clear=false

# =============================================================================
# POTATO — integrated GPU / maximum FPS
# No shadows, no AA, no bloom, no godrays, no clouds, no SSAO.
# =============================================================================
SHADOW_MAP_RESOLUTION.POTATO=512
SHADOW_BLUR.POTATO=0
GODRAY_STEPS.POTATO=0
VOLUMETRIC_FOG_DENSITY.POTATO=0.0
WAVING_LEAVES.POTATO=0
CLOUD_COVERAGE.POTATO=0.0
CLOUD_SPEED.POTATO=0.3
EMISSIVE_BRIGHTNESS.POTATO=1.5
SSAO_SAMPLES.POTATO=0
AO_STRENGTH.POTATO=0.0
TAA_TOGGLE.POTATO=0
TAA_FEEDBACK.POTATO=0.9
BLOOM.POTATO=0
BLOOM_THRESHOLD.POTATO=9999.0
BLOOM_STRENGTH.POTATO=0.0

# =============================================================================
# MEDIUM — GTX 1060 / RX 580
# Hard shadows, 4-sample SSAO, basic bloom, 4-step godrays. No TAA.
# =============================================================================
SHADOW_MAP_RESOLUTION.MEDIUM=1024
SHADOW_BLUR.MEDIUM=0
GODRAY_STEPS.MEDIUM=4
VOLUMETRIC_FOG_DENSITY.MEDIUM=0.25
WAVING_LEAVES.MEDIUM=1
CLOUD_COVERAGE.MEDIUM=0.5
CLOUD_SPEED.MEDIUM=0.3
EMISSIVE_BRIGHTNESS.MEDIUM=2.5
SSAO_SAMPLES.MEDIUM=4
AO_STRENGTH.MEDIUM=0.5
TAA_TOGGLE.MEDIUM=0
TAA_FEEDBACK.MEDIUM=0.9
BLOOM.MEDIUM=1
BLOOM_THRESHOLD.MEDIUM=1.0
BLOOM_STRENGTH.MEDIUM=0.03

# =============================================================================
# HIGH — RTX 3060 / RX 6700 XT  (default)
# PCF soft shadows, 8-sample SSAO, TAA, bloom, 8-step godrays.
# =============================================================================
SHADOW_MAP_RESOLUTION.HIGH=2048
SHADOW_BLUR.HIGH=1
GODRAY_STEPS.HIGH=8
VOLUMETRIC_FOG_DENSITY.HIGH=0.5
WAVING_LEAVES.HIGH=1
CLOUD_COVERAGE.HIGH=0.5
CLOUD_SPEED.HIGH=0.3
EMISSIVE_BRIGHTNESS.HIGH=3.0
SSAO_SAMPLES.HIGH=8
AO_STRENGTH.HIGH=0.6
TAA_TOGGLE.HIGH=1
TAA_FEEDBACK.HIGH=0.9
BLOOM.HIGH=1
BLOOM_THRESHOLD.HIGH=0.9
BLOOM_STRENGTH.HIGH=0.04

# =============================================================================
# ULTRA — RTX 4080+
# 4K shadow map, 16-sample SSAO, TAA, high-quality bloom, 16-step godrays.
# =============================================================================
SHADOW_MAP_RESOLUTION.ULTRA=4096
SHADOW_BLUR.ULTRA=1
GODRAY_STEPS.ULTRA=16
VOLUMETRIC_FOG_DENSITY.ULTRA=1.0
WAVING_LEAVES.ULTRA=1
CLOUD_COVERAGE.ULTRA=0.5
CLOUD_SPEED.ULTRA=0.3
EMISSIVE_BRIGHTNESS.ULTRA=3.0
SSAO_SAMPLES.ULTRA=16
AO_STRENGTH.ULTRA=0.6
TAA_TOGGLE.ULTRA=1
TAA_FEEDBACK.ULTRA=0.9
BLOOM.ULTRA=1
BLOOM_THRESHOLD.ULTRA=0.7
BLOOM_STRENGTH.ULTRA=0.05
