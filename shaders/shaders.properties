# Disable legacy Minecraft fixed-function fog to prevent visual conflicts
fog=off

# Define the presets inside the game GUI
profile.Potato=POTATO
profile.Medium=MEDIUM
profile.High=HIGH
profile.Ultra=ULTRA

# POTATO PRESET (No shadows, no bloom, no waving, maximum FPS)
SHADOW_MAP_RESOLUTION.POTATO=512
TAA_TOGGLE.POTATO=0
VOLUMETRIC_FOG_DENSITY.POTATO=0.0
SHADOW_BLUR.POTATO=0
BLOOM.POTATO=0
WAVING_LEAVES.POTATO=0

# MEDIUM PRESET (Hard shadows, bloom, waving, standard performance)
SHADOW_MAP_RESOLUTION.MEDIUM=1024
TAA_TOGGLE.MEDIUM=0
VOLUMETRIC_FOG_DENSITY.MEDIUM=0.25
SHADOW_BLUR.MEDIUM=0
BLOOM.MEDIUM=1
WAVING_LEAVES.MEDIUM=1

# HIGH PRESET (Default configuration: soft shadows, bloom, TAA, waving)
SHADOW_MAP_RESOLUTION.HIGH=2048
TAA_TOGGLE.HIGH=1
VOLUMETRIC_FOG_DENSITY.HIGH=0.5
SHADOW_BLUR.HIGH=1
BLOOM.HIGH=1
WAVING_LEAVES.HIGH=1

# ULTRA PRESET (Maximum shadow resolution, volumetric density)
SHADOW_MAP_RESOLUTION.ULTRA=4096
TAA_TOGGLE.ULTRA=1
VOLUMETRIC_FOG_DENSITY.ULTRA=1.0
SHADOW_BLUR.ULTRA=1
BLOOM.ULTRA=1
WAVING_LEAVES.ULTRA=1
