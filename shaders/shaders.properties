# =============================================================================
# Abyss Shader — shaders.properties
# Buffer formats, profile presets, and per-profile option overrides.
# Selecting a profile injects POTATO / MEDIUM / HIGH / ULTRA into GLSL,
# which shaders.settings maps to PROFILE_* tier macros.
# =============================================================================

fog=off

# ---------------------------------------------------------------------------
# Profile declarations (must match shaders.txt profile.* entries)
# ---------------------------------------------------------------------------
profile.Potato=POTATO
profile.Medium=MEDIUM
profile.High=HIGH
profile.Ultra=ULTRA

# ---------------------------------------------------------------------------
# G-Buffer format declarations
# colortex0–2: 8-bit RGBA (albedo, normals, lightmap)
# colortex3:   HDR scene — 16-bit to avoid highlight banding
# colortex4:   emissive + AO
# colortex5:   TAA history — 16-bit, persists across frames
# colortex6:   bloom chain — 16-bit
# ---------------------------------------------------------------------------
colortex0Format=RGBA8
colortex1Format=RGBA8
colortex2Format=RGBA8
colortex3Format=RGBA16
colortex4Format=RGBA8
colortex5Format=RGBA16
colortex6Format=RGBA16

colortex5Clear=false

# =============================================================================
# POTATO — integrated GPU / maximum FPS
# Forward lighting, no shadows, no AA, basic contrast only.
# =============================================================================
SHADOW_MAP_RESOLUTION.POTATO=512
SHADOW_BLUR.POTATO=0
PCSS_SHADOWS.POTATO=0
GODRAY_STEPS.POTATO=0
VOLUMETRIC_FOG_DENSITY.POTATO=0.0
WAVING_LEAVES.POTATO=0
CLOUD_COVERAGE.POTATO=0.0
CLOUD_SPEED.POTATO=0.3
POM_STEPS.POTATO=0
EMISSIVE_BRIGHTNESS.POTATO=1.5
WETNESS_ROUGHNESS_SCALE.POTATO=1.0
SSAO_SAMPLES.POTATO=0
AO_STRENGTH.POTATO=0.0
RENDER_SCALE.POTATO=1.0
TAA_TOGGLE.POTATO=0
TAA_FEEDBACK.POTATO=0.9
BLOOM.POTATO=0
BLOOM_THRESHOLD.POTATO=9999.0
BLOOM_STRENGTH.POTATO=0.0
SSR.POTATO=0
SSGI_SAMPLES.POTATO=0
TONEMAP_EXPOSURE.POTATO=0.0
TONEMAP_CONTRAST.POTATO=1.0

# =============================================================================
